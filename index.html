<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Step 4: Preload font stylesheet early so the browser queues it before scripts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" crossorigin>
    
    <!-- Hide icon fallback text until font loads -->
    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-display: block;
      }
    </style>
    <title>TechDance HR</title>
    <!-- Step 1: Preloader styles — inlined so they apply before any CSS bundle loads -->
    <style>
      @keyframes pl-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.35; }
        50%       { transform: translateY(-8px); opacity: 1; }
      }
      #global-preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.4s ease-out;
      }
      #global-preloader.hiding {
        opacity: 0;
        pointer-events: none;
      }
      .pl-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .pl-icon {
        width: 40px;
        height: 40px;
        background: #4F46E5;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(79,70,229,0.30);
      }
      .pl-text-wrap { display: flex; flex-direction: column; }
      .pl-title {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.4px;
        line-height: 1.1;
      }
      .pl-sub {
        font-size: 10px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-top: 3px;
      }
      .pl-dots {
        display: flex;
        gap: 7px;
      }
      .pl-dot {
        width: 7px;
        height: 7px;
        background: #4F46E5;
        border-radius: 50%;
        animation: pl-bounce 1.1s ease-in-out infinite;
      }
      .pl-dot:nth-child(2) { animation-delay: 0.18s; }
      .pl-dot:nth-child(3) { animation-delay: 0.36s; }
    </style>
  </head>
  <body>
    <!-- Step 1: Global masking layer — rendered before React, removed by App.jsx -->
    <div id="global-preloader">
      <div class="pl-logo">
        <div class="pl-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 2L13.8 8.2L21 9.3L16 14.1L17.2 21L11 17.6L4.8 21L6 14.1L1 9.3L8.2 8.2L11 2Z" fill="white"/>
          </svg>
        </div>
        <div class="pl-text-wrap">
          <span class="pl-title">TechDance HR</span>
          <span class="pl-sub">HRMS Platform</span>
        </div>
      </div>
      <div class="pl-dots">
        <div class="pl-dot"></div>
        <div class="pl-dot"></div>
        <div class="pl-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
